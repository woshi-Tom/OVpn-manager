apiVersion: v1
kind: Secret
metadata:
  name: vpn-secret
  namespace: vpn-manager
type: Opaque
stringData:
  # 数据库连接信息（Core 使用）
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "vpn_db"
  DB_USER: "vpn_core"
  DB_PASSWORD: "CHANGE_ME"
  ENCRYPTION_KEY: "CHANGE_ME_TO_RANDOM_STRING"

  # Web 数据库认证文件内容
  web-db-auth: |
    host=postgres-service
    port=5432
    dbname=vpn_db
    user=vpn_web
    password=CHANGE_ME
